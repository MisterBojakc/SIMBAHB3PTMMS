    --navy:      #0A1628;
    --navyMid:   #0F2040;
    --navyLight: #162B4D;
    --border:    #1E3A5F;
    --amber:     #F59E0B;
    --amberL:    #FCD34D;
    --red:       #EF4444;
    --green:     #10B981;
    --blue:      #3B82F6;
    --cyan:      #06B6D4;
    --purple:    #A78BFA;
    --pink:      #F472B6;
    --orange:    #FB923C;
    --text:      #E2E8F0;
    --muted:     #64748B;
    --dim:       #94A3B8;
  }
  html, body { height: 100%; background: var(--navy); color: var(--text); }
  body { font-family: 'Sora', sans-serif; }
  #root { min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--navyMid); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Animations */
  @keyframes fadeIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }

  .slide-in { animation: slideIn .3s ease both; }

  /* Hover effects */

  .card-hover:hover { border-color: var(--amber) !important; }

<body>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ─── MASTER DATA ──────────────────────────────────────────────────────────────
const UNITS = ["Layanan Transaksi Tol","HS","IT","Medis"];

const B3_TYPES = [

  { id:"majun_terkontaminasi", label:"Majun Terkontaminasi",        unit:"Kg",    color:"#06B6D4", icon:"🧻" },
  { id:"lampu_tl",             label:"Lampu TL / Neon Bekas",       unit:"Unit",  color:"#A78BFA", icon:"💡" },

  { value:"sudah_diangkut",  label:"Sudah Diangkut",   color:"#10B981" },

const MITRA_OPT = ["PT Setia Utama Nusantara"];

const INIT = [
  { id:1, unit:"Layanan Transaksi Tol", type:"lampu_tl",            qty:24,  date:"2025-03-10", status:"sudah_diangkut",  mitra:"PT Setia Utama Nusantara", manifest:"MF-2025-0031", catatan:"Lampu gardu utama",      photos:[] },
  { id:2, unit:"IT",                    type:"elektronik",           qty:35,  date:"2025-03-18", status:"sudah_diangkut",  mitra:"PT Setia Utama Nusantara", manifest:"MF-2025-0044", catatan:"Monitor & UPS rusak",    photos:[] },
  { id:3, unit:"Medis",                 type:"obat_kadaluarsa",      qty:8,   date:"2025-04-01", status:"sudah_diangkut",  mitra:"PT Setia Utama Nusantara", manifest:"MF-2025-0059", catatan:"Obat P3K kadaluarsa",    photos:[] },
  { id:4, unit:"HS",                    type:"oli_bekas",            qty:120, date:"2025-04-05", status:"menunggu_pickup", mitra:"PT Setia Utama Nusantara", manifest:"",              catatan:"Menunggu jadwal pickup", photos:[] },
  { id:5, unit:"Layanan Transaksi Tol", type:"majun_terkontaminasi", qty:12,  date:"2025-04-07", status:"tersimpan",       mitra:"",                         manifest:"",              catatan:"",                       photos:[] },
  { id:6, unit:"IT",                    type:"aki_bekas",            qty:6,   date:"2025-04-09", status:"menunggu_pickup", mitra:"PT Setia Utama Nusantara", manifest:"",              catatan:"UPS server lama",        photos:[] },
  { id:7, unit:"Medis",                 type:"kemasan_b3",           qty:20,  date:"2025-04-10", status:"tersimpan",       mitra:"",                         manifest:"",              catatan:"",                       photos:[] },
  { id:8, unit:"HS",                    type:"lampu_tl",             qty:18,  date:"2025-04-11", status:"tersimpan",       mitra:"",                         manifest:"",              catatan:"Akan digabung",          photos:[] },
];

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const getType   = id => B3_TYPES.find(t=>t.id===id)||B3_TYPES[0];
const getStatus = v  => STATUS_OPT.find(s=>s.value===v)||STATUS_OPT[0];
const fmtDate   = d  => new Date(d).toLocaleDateString("id-ID",{day:"2-digit",month:"short",year:"numeric"});
const fmtNow    = ()  => new Date().toLocaleDateString("id-ID",{day:"2-digit",month:"long",year:"numeric"});

// ─── BADGE ────────────────────────────────────────────────────────────────────
const Badge = ({color,children,small}) => (
  <span style={{
    background:color+"22", color, border:`1px solid ${color}55`,
    borderRadius:6, padding: small?"1px 8px":"3px 12px",
    fontSize: small?10:11, fontWeight:700, letterSpacing:"0.03em", whiteSpace:"nowrap",
  }}>{children}</span>

// ─── STAT CARD ────────────────────────────────────────────────────────────────
const StatCard = ({label,value,sub,color,icon}) => (
  <div className="card-hover" style={{
    background:"var(--navyMid)", border:"1px solid var(--border)",
    borderTop:`3px solid ${color}`, borderRadius:14, padding:"20px 22px",
    flex:1, minWidth:130,
  }}>
    <div style={{fontSize:24,marginBottom:6}}>{icon}</div>
    <div style={{color:"var(--muted)",fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>{label}</div>
    <div style={{color,fontSize:30,fontWeight:800,lineHeight:1,fontFamily:"'JetBrains Mono',monospace"}}>{value}</div>

// ─── MINI BAR ─────────────────────────────────────────────────────────────────
const MiniBar = ({label,value,max,color,unit}) => (

    <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
      <span style={{color:"var(--dim)",fontSize:12}}>{label}</span>

    </div>

// ─── INPUT STYLE ──────────────────────────────────────────────────────────────
const IS = {
  background:"var(--navyLight)", border:"1px solid var(--border)", borderRadius:8,
  color:"var(--text)", padding:"10px 13px", fontSize:13, width:"100%", outline:"none",
  fontFamily:"'Sora',sans-serif",
};

// ─── PHOTO UPLOADER ───────────────────────────────────────────────────────────
const PhotoUploader = ({photos, onChange}) => {
  const ref = useRef();
  const [drag, setDrag] = useState(false);

  const readFiles = files => {
    const fileArr = Array.from(files).filter(f => f.type.startsWith("image/"));
    if (!fileArr.length) return;
    const results = new Array(fileArr.length);
    let done = 0;
    fileArr.forEach((f, i) => {
      const r = new FileReader();
      r.onload = ev => {
        results[i] = { src: ev.target.result, name: f.name, ts: Date.now() };
        done++;
        if (done === fileArr.length) {
          onChange([...photos, ...results.filter(Boolean)]);
        }
      };
      r.onerror = () => { done++; if (done === fileArr.length) onChange([...photos, ...results.filter(Boolean)]); };
      r.readAsDataURL(f);
    });
  };

  return (
    <div>
      <div
        onClick={()=>ref.current.click()}
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);readFiles(e.dataTransfer.files);}}
        style={{
          border:`2px dashed ${drag?"var(--amber)":"var(--border)"}`,
          borderRadius:10, padding:"22px 16px", textAlign:"center",
          cursor:"pointer", background: drag?"rgba(245,158,11,.08)":"var(--navyLight)",
          transition:"all .2s",
        }}
      >
        <div style={{fontSize:30,marginBottom:6}}>📷</div>
        <div style={{color:"var(--amber)",fontSize:13,fontWeight:700}}>Klik atau Drop Foto di Sini</div>
        <div style={{color:"var(--muted)",fontSize:11,marginTop:4}}>JPG, PNG, HEIC · Bisa pilih beberapa sekaligus</div>
      </div>
      <input ref={ref} type="file" accept="image/*" multiple style={{display:"none"}}
        onChange={e=>{readFiles(e.target.files);e.target.value="";}}/>
      {photos.length>0&&(
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:12}}>
          {photos.map((p,i)=>(
            <div key={i} style={{position:"relative"}}>
              <img src={p.src} alt={p.name} style={{
                width:80,height:80,objectFit:"cover",borderRadius:8,
                border:"1px solid var(--border)",display:"block",
              }}/>
              <button onClick={()=>onChange(photos.filter((_,j)=>j!==i))} style={{
                position:"absolute",top:-7,right:-7,background:"var(--red)",color:"#fff",
                border:"none",borderRadius:"50%",width:22,height:22,fontSize:12,
                cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
              }}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ─── LIGHTBOX ─────────────────────────────────────────────────────────────────
const Lightbox = ({photos,startIdx,onClose}) => {
  const [idx,setIdx] = useState(startIdx);
  useEffect(()=>{
    const esc = e => { if(e.key==="Escape") onClose(); };
    window.addEventListener("keydown",esc);
    return ()=>window.removeEventListener("keydown",esc);
  },[]);
  return (
    <div onClick={onClose} style={{
      position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:2000,
      display:"flex",alignItems:"center",justifyContent:"center",
    }}>
      <div onClick={e=>e.stopPropagation()} style={{position:"relative",maxWidth:"90vw"}}>
        <img src={photos[idx].src} alt="" style={{
          maxWidth:"80vw",maxHeight:"82vh",borderRadius:12,objectFit:"contain",
          boxShadow:"0 24px 80px rgba(0,0,0,.6)",
        }}/>
        <button onClick={onClose} style={{
          position:"absolute",top:-16,right:-16,background:"var(--red)",color:"#fff",
          border:"none",borderRadius:"50%",width:34,height:34,fontSize:18,cursor:"pointer",
        }}>✕</button>
        {photos.length>1&&<>
          <button onClick={()=>setIdx((idx-1+photos.length)%photos.length)} style={{
            position:"absolute",left:-56,top:"50%",transform:"translateY(-50%)",
            background:"var(--navyMid)",color:"var(--text)",border:"1px solid var(--border)",
            borderRadius:8,width:40,height:40,cursor:"pointer",fontSize:20,
          }}>‹</button>
          <button onClick={()=>setIdx((idx+1)%photos.length)} style={{
            position:"absolute",right:-56,top:"50%",transform:"translateY(-50%)",
            background:"var(--navyMid)",color:"var(--text)",border:"1px solid var(--border)",
            borderRadius:8,width:40,height:40,cursor:"pointer",fontSize:20,
          }}>›</button>
        </>}
        <div style={{textAlign:"center",color:"var(--dim)",fontSize:11,marginTop:10}}>
          {photos[idx].name} &nbsp;·&nbsp; {idx+1} / {photos.length}
        </div>
      </div>
    </div>
  );
};

// ─── DETAIL MODAL ─────────────────────────────────────────────────────────────
const DetailModal = ({entry,onClose,onUpdateStatus,onUpdateManifest,onAddPhoto}) => {
  const t = getType(entry.type), s = getStatus(entry.status);
  const [lb,setLb]     = useState(null);
  const [mf,setMf]     = useState(entry.manifest);
  const fileRef        = useRef();

  const readFile = f => {
    const r = new FileReader();
    r.onload = ev => onAddPhoto(entry.id, {src: ev.target.result, name: f.name, ts: Date.now()});
    r.onerror = () => console.warn("Gagal membaca file:", f.name);
    r.readAsDataURL(f);
  };

  return (
    <div onClick={onClose} style={{
      position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:900,
      display:"flex",alignItems:"center",justifyContent:"center",padding:20,
    }}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:"var(--navyMid)",border:"1px solid var(--border)",borderRadius:16,
        padding:28,width:540,maxWidth:"100%",maxHeight:"90vh",overflowY:"auto",
      }}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div>
            <div style={{color:t.color,fontSize:20,fontWeight:800,marginBottom:4}}>{t.icon} {t.label}</div>
            <div style={{color:"var(--dim)",fontSize:12}}>{entry.unit} &nbsp;·&nbsp; {fmtDate(entry.date)}</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:"var(--muted)",fontSize:22,cursor:"pointer"}}>✕</button>
        </div>

        {/* Info */}
        {[
          ["Jumlah",            `${entry.qty} ${t.unit}`],
          ["Status",            <Badge color={s.color}>{s.label}</Badge>],
          ["Mitra Transporter", entry.mitra||"—"],
          ["Catatan",           entry.catatan||"—"],
        ].map(([k,v])=>(
          <div key={k} style={{display:"flex",gap:12,padding:"9px 0",borderBottom:"1px solid var(--border)"}}>
            <span style={{color:"var(--muted)",fontSize:12,minWidth:145}}>{k}</span>
            <span style={{color:"var(--text)",fontSize:12}}>{v}</span>
          </div>
        ))}

        {/* Manifest */}
        <div style={{padding:"14px 0",borderBottom:"1px solid var(--border)"}}>
          <div style={{color:"var(--muted)",fontSize:11,fontWeight:700,letterSpacing:"0.06em",marginBottom:8}}>NO. MANIFEST</div>
          <div style={{display:"flex",gap:8}}>
            <input value={mf} onChange={e=>setMf(e.target.value)} placeholder="MF-2025-XXXX" style={{...IS,flex:1}}/>
            <button onClick={()=>onUpdateManifest(entry.id,mf)} style={{
              background:"rgba(59,130,246,.15)",border:"1px solid rgba(59,130,246,.4)",color:"var(--blue)",
              borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:12,fontWeight:700,
            }}>Simpan</button>
          </div>
        </div>

        {/* Status actions */}
        <div style={{display:"flex",gap:8,padding:"14px 0",borderBottom:"1px solid var(--border)"}}>
          {entry.status==="tersimpan"&&(
            <button onClick={()=>{onUpdateStatus(entry.id,"menunggu_pickup");onClose();}} style={{
              background:"rgba(59,130,246,.15)",border:"1px solid rgba(59,130,246,.4)",color:"var(--blue)",
              borderRadius:8,padding:"9px 18px",cursor:"pointer",fontSize:12,fontWeight:700,
            }}>⏳ Request Pickup</button>
          )}
          {entry.status==="menunggu_pickup"&&(
            <button onClick={()=>{onUpdateStatus(entry.id,"sudah_diangkut");onClose();}} style={{
              background:"rgba(16,185,129,.15)",border:"1px solid rgba(16,185,129,.4)",color:"var(--green)",
              borderRadius:8,padding:"9px 18px",cursor:"pointer",fontSize:12,fontWeight:700,
            }}>✅ Konfirmasi Sudah Diangkut</button>
          )}
          {entry.status==="sudah_diangkut"&&(
            <span style={{color:"var(--green)",fontSize:12,alignSelf:"center"}}>✅ Proses Selesai</span>
          )}
        </div>

        {/* Photos */}
        <div style={{paddingTop:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{color:"var(--amberL)",fontSize:12,fontWeight:700,letterSpacing:"0.04em"}}>
              📷 FOTO BUKTI ({entry.photos.length})
            </div>
            <button onClick={()=>fileRef.current.click()} style={{
              background:"rgba(245,158,11,.12)",border:"1px solid rgba(245,158,11,.3)",color:"var(--amber)",
              borderRadius:7,padding:"5px 12px",cursor:"pointer",fontSize:11,fontWeight:700,
            }}>+ Tambah Foto</button>
          </div>
          <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}}
            onChange={e=>{Array.from(e.target.files).forEach(readFile);e.target.value="";}}/>
          {entry.photos.length===0
            ? <div style={{color:"var(--muted)",fontSize:12,fontStyle:"italic",padding:"12px 0"}}>Belum ada foto.</div>
            : <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                {entry.photos.map((p,i)=>(
                  <div key={i} style={{cursor:"pointer"}} onClick={()=>setLb(i)}>
                    <img src={p.src} alt={p.name} style={{
                      width:88,height:88,objectFit:"cover",borderRadius:8,
                      border:"2px solid var(--border)",transition:"border-color .2s",
                    }}
                    onMouseEnter={e=>e.currentTarget.style.borderColor="var(--amber)"}
                    onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}
                    />
                  </div>
                ))}
              </div>
          }
        </div>

        {lb!==null&&<Lightbox photos={entry.photos} startIdx={lb} onClose={()=>setLb(null)}/>}
      </div>
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]               = useState("dashboard");
  const [entries,setEntries]       = useState(INIT);
  const [filterUnit,setFilterUnit] = useState("Semua Unit");
  const [filterStatus,setFilterStatus] = useState("semua");
  const [toast,setToast]           = useState("");
  const [nextId,setNextId]         = useState(INIT.length+1);
  const [detail,setDetail]         = useState(null);
  const [mobileNav,setMobileNav]   = useState(false);

  const blankForm = { unit:UNITS[0], type:B3_TYPES[0].id, qty:"",
    date:new Date().toISOString().split("T")[0],
    status:"tersimpan", mitra:"", manifest:"", catatan:"", photos:[] };
  const [form,setForm] = useState(blankForm);

  // Computed
  const total     = entries.length;
  const diangkut  = entries.filter(e=>e.status==="sudah_diangkut").length;
  const menunggu  = entries.filter(e=>e.status==="menunggu_pickup").length;
  const tersimpan = entries.filter(e=>e.status==="tersimpan").length;
  const withPhoto = entries.filter(e=>e.photos.length>0).length;

  const byType = B3_TYPES.map(t=>({
    ...t,
    total: entries.filter(e=>e.type===t.id).reduce((s,e)=>s+Number(e.qty),0),
  })).filter(t=>t.total>0).sort((a,b)=>b.total-a.total);
  const maxQ = Math.max(...byType.map(t=>t.total),1);

  const byUnit = UNITS.map(u=>({
    name:u,
    count: entries.filter(e=>e.unit===u).length,
    fp:    entries.filter(e=>e.unit===u&&e.photos.length>0).length,
  })).sort((a,b)=>b.count-a.count);

  const filtered = entries
    .filter(e=>(filterUnit==="Semua Unit"||e.unit===filterUnit)&&(filterStatus==="semua"||e.status===filterStatus))
    .sort((a,b)=>new Date(b.date)-new Date(a.date));

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(""),4200); };

  const handleSubmit = () => {
    if(!form.qty||isNaN(form.qty)||Number(form.qty)<=0){ alert("Masukkan jumlah yang valid."); return; }
    setEntries(prev=>[...prev,{...form,id:nextId,qty:Number(form.qty)}]);
    setNextId(n=>n+1);
    setForm(blankForm);
    showToast("✅ Data limbah B3 berhasil disimpan!");
    setTab("log");
  };

  const updateStatus   = (id,s) => setEntries(prev=>prev.map(e=>e.id===id?{...e,status:s}:e));
  const updateManifest = (id,m) => setEntries(prev=>prev.map(e=>e.id===id?{...e,manifest:m}:e));
  const addPhoto       = (id,p) => setEntries(prev=>prev.map(e=>e.id===id?{...e,photos:[...e.photos,p]}:e));
const handleHapusLogbook = async (idData) => {
    if (!confirm("Apakah Anda yakin ingin menghapus data logbook ini?")) return;

    try {
      const response = await fetch(SPREADSHEET_WEBAPP_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "delete",
          data: { id: idData }
        })
      });
      
      const resData = await response.json();

                      <div style={{padding:"14px 16px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                          <span style={{color:t.color,fontSize:13,fontWeight:700}}>{t.icon} {t.label}</span>
                          <Badge color={s.color} small>{s.label.replace("Tersimpan di TPS","Tersimpan")}</Badge>
                        </div>
                        <div style={{color:"var(--dim)",fontSize:11,marginBottom:4}}>{e.unit} · {fmtDate(e.date)}</div>
                        <div style={{color:"var(--text)",fontSize:13,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>
                          {e.qty} <span style={{color:"var(--muted)",fontWeight:400,fontSize:11}}>{t.unit}</span>
                        </div>
                        {e.manifest&&<div style={{color:"var(--green)",fontSize:11,marginTop:5}}>📄 {e.manifest}</div>}
                        <div style={{color:"var(--purple)",fontSize:11,marginTop:4}}>📷 {e.photos.length} foto</div>
                        <button onClick={()=>setDetail(entries.find(x=>x.id===e.id))} style={{
                          background:"var(--navyLight)",border:"1px solid var(--border)",color:"var(--dim)",
                          borderRadius:7,padding:"7px 14px",fontSize:11,cursor:"pointer",
                          marginTop:12,width:"100%",fontWeight:600,transition:"border-color .2s",
                        }}
                        onMouseEnter={ev=>ev.currentTarget.style.borderColor="var(--amber)"}
                        onMouseLeave={ev=>ev.currentTarget.style.borderColor="var(--border)"}
                        >Lihat Detail & Foto →</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ════════════════ LAPORAN ════════════════ */}
        {tab==="laporan"&&(
          <div style={{maxWidth:760}}>
            <div style={{background:"var(--navyMid)",border:"1px solid var(--border)",borderRadius:14,padding:28,marginBottom:18}}>
              <div style={{color:"var(--amberL)",fontWeight:800,fontSize:16,marginBottom:20,letterSpacing:"0.04em"}}>
                📄 RINGKASAN LAPORAN B3 — {new Date().getFullYear()}
              </div>

              {/* Compliance table */}
              <div className="table-wrap" style={{background:"var(--navyLight)",borderRadius:10,overflow:"hidden",marginBottom:22}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:520}}>
                  <thead>
                    <tr style={{background:"var(--border)"}}>
                      {["JENIS LIMBAH","TOTAL VOLUME","TERANGKUT","COMPLIANCE","FOTO"].map(h=>(
                        <th key={h} style={{color:"var(--muted)",fontSize:10,fontWeight:700,letterSpacing:"0.06em",padding:"11px 14px",textAlign:"left"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {byType.map((t,i)=>{
                      const angkut = entries.filter(e=>e.type===t.id&&e.status==="sudah_diangkut").reduce((s,e)=>s+e.qty,0);
                      const pct    = t.total>0?Math.round(angkut/t.total*100):0;
                      const fp     = entries.filter(e=>e.type===t.id&&e.photos.length>0).length;
                      const pColor = pct===100?"var(--green)":pct>=50?"var(--amber)":"var(--red)";
                      return (
                        <tr key={t.id} style={{borderTop:"1px solid var(--border)",background:i%2===0?"transparent":"rgba(10,22,40,.4)"}}>
                          <td style={{padding:"11px 14px",color:t.color,fontSize:12}}>{t.icon} {t.label}</td>
                          <td style={{padding:"11px 14px",color:"var(--text)",fontSize:12,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{t.total} <span style={{color:"var(--muted)",fontWeight:400,fontSize:10}}>{t.unit}</span></td>
                          <td style={{padding:"11px 14px",color:"var(--green)",fontSize:12,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{angkut} <span style={{color:"var(--muted)",fontWeight:400,fontSize:10}}>{t.unit}</span></td>
                          <td style={{padding:"11px 14px"}}>
                            <span style={{color:pColor,fontSize:13,fontWeight:800,fontFamily:"'JetBrains Mono',monospace"}}>{pct}%</span>
                          </td>
                          <td style={{padding:"11px 14px",color:fp>0?"var(--purple)":"var(--muted)",fontSize:11}}>
                            {fp>0?`📷 ${fp}`:"—"}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              {/* KPI Cards */}
              <div className="kpi-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
                {[
                  {label:"Compliance Rate",     value:`${total?Math.round(diangkut/total*100):0}%`, color:"var(--green)",  desc:"Sudah diangkut mitra"},
                  {label:"Manifest Terbit",     value:entries.filter(e=>e.manifest).length,          color:"var(--blue)",   desc:"Dokumen tercatat"},
                  {label:"Bukti Foto",          value:withPhoto,                                     color:"var(--purple)", desc:"Entri terdokumentasi"},
                  {label:"Perlu Tindak Lanjut", value:tersimpan+menunggu,                            color:(tersimpan+menunggu)>3?"var(--red)":"var(--amber)", desc:"Belum diangkut"},
                ].map((k,i)=>(
                  <div key={i} style={{background:"var(--navyLight)",border:"1px solid var(--border)",borderRadius:10,padding:"18px 14px",textAlign:"center"}}>
                    <div style={{color:k.color,fontSize:26,fontWeight:800,fontFamily:"'JetBrains Mono',monospace"}}>{k.value}</div>
                    <div style={{color:"var(--text)",fontSize:11,fontWeight:700,marginTop:5}}>{k.label}</div>
                    <div style={{color:"var(--muted)",fontSize:10,marginTop:3}}>{k.desc}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Alert */}
            {(menunggu>0||tersimpan>0)&&(
              <div style={{background:"rgba(239,68,68,.07)",border:"1px solid rgba(239,68,68,.3)",borderRadius:12,padding:"18px 22px"}}>
                <div style={{color:"var(--red)",fontWeight:700,fontSize:13,marginBottom:12}}>
                  ⚠️ ITEM PERLU TINDAK LANJUT SEGERA
                </div>
                {entries.filter(e=>e.status!=="sudah_diangkut").map(e=>{
                  const t=getType(e.type), s=getStatus(e.status);
                  return (
                    <div key={e.id} style={{
                      display:"flex",gap:10,alignItems:"center",
                      color:"var(--dim)",fontSize:12,padding:"6px 0",
                      borderBottom:"1px solid var(--border)",flexWrap:"wrap",
                    }}>
                      <span>{t.icon}</span>
                      <b style={{color:"var(--text)"}}>{e.unit}</b>
                      <span>—</span>
                      <span>{t.label} {e.qty} {t.unit}</span>
                      <span>—</span>
                      <Badge color={s.color} small>{s.label}</Badge>
                      {e.photos.length===0&&<span style={{color:"var(--amber)",fontSize:10}}>⚠️ Belum ada foto</span>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </main>

      {/* ── FOOTER ── */}
      <footer style={{
        borderTop:"1px solid var(--border)",padding:"14px 28px",
        display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,
        color:"var(--muted)",fontSize:10,background:"var(--navyMid)",
      }}>
        <span>SISTEM PENGELOLAAN LIMBAH B3 · MITRA: PT SETIA UTAMA NUSANTARA</span>
        <span>Solid Waste Diverted · GHG Reduction · PT MARGA MANDALASAKTI {new Date().getFullYear()}</span>
      </footer>

      {/* ── DETAIL MODAL ── */}
      {detail&&(
        <DetailModal
          entry={detail}
          onClose={()=>setDetail(null)}
          onUpdateStatus={(id,s)=>updateStatus(id,s)}
          onUpdateManifest={(id,m)=>updateManifest(id,m)}
          onAddPhoto={(id,p)=>addPhoto(id,p)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
